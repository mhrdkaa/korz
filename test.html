<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe PoC Test</title>
</head>
<body>
    <h2>Test Iframe GitHub Pages</h2>
    <div id="iframe-container"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let f = document.createElement('iframe');
            f.className = 'custom-iframe';
            f.sandbox = 'allow-popups allow-scripts';
            
            f.srcdoc = `
                <div style="font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100%; margin: 0;">
                    <a target="_blank" href="https://ndev.tk/evil.html" 
                       style="padding: 10px 20px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
                        Click me
                    </a>
                </div>
            `;
            document.getElementById('iframe-container').appendChild(f);
        });
    </script>
</body>
</html>
